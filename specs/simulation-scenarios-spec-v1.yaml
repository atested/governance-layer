spec_id: simulation-scenarios-v1
title: Simulation Scenarios Specification
status: active
scope: atested-com
last_verified: 2026-05-23
owner: greg
imports: []

overview:
  normative_scope: >
    Converts simulation-scenarios.md into Atested Specification Format v3.
    The spec covers the five public simulation scenarios used by the pricing
    simulation and the operator UI demo simulation on atested.com.
  non_normative_notes:
    - >
      The source document describes itself as the single reference document for
      all simulation content. Current code implements both a pricing simulation
      under pricing/sim and an operator UI demo under demo/sim.
    - >
      Several precise fixture values in code differ from the legacy document
      counts and persona text. Those elements are marked partial or
      contradictory rather than silently normalizing the conversion.
    - >
      This YAML file uses top-level envelope fields rather than Markdown
      frontmatter because the requested artifact has a .yaml extension.

elements:
  - element_type: data_schema
    id: SCH-SIM-001
    schema: simulation_scenario_fixture
    severity: high
    components:
      producers: [browser-ui]
    type: object
    required: [health, approvals, communications, licensingMode, questionnaireState, caseDocument]
    properties:
      persona:
        type: object
      health:
        type: object
        required: [chain]
      approvals:
        type: object
      communications:
        type: object
        required: [slots]
      licensingMode:
        type: object
        required: [license_status, license_tier]
      questionnaireState:
        type: object
      caseDocument:
        type: object
    additionalProperties: true
    check_type: consistency
    verification_mode: generated_test
    preconditions:
      - repo_root: atested.com
    observe:
      source: file_state
      selector:
        base: website_root
        path: demo/sim/fixtures/*.js
    verify: >
      Each fixture exports the scenario objects required by the demo API:
      health, approvals, communications, licensingMode, questionnaireState,
      and caseDocument.
    status: active
    implementation_status: implemented
    verification_status: unverified
    references:
      legacy_spec:
        file: simulation-scenarios.md
        section: "Simulation screens"
      code:
        - file: demo/sim/api.js
          line: 253
        - file: demo/sim/api.js
          line: 271
        - file: demo/sim/api.js
          line: 1239
        - file: demo/sim/api.js
          line: 1267

