spec_id: chain-events-v1
title: Governance Chain Event Registry
status: active
scope: governance-layer
last_verified: '2026-05-23'
owner: greg
imports: []
overview:
  normative_scope: Registry of non-action governance chain event types accepted by scripts/event_model.py.
  non_normative_notes:
  - Event IDs start at EVT-CHN-101 to avoid colliding with chain-integrity-spec-v1.yaml EVT-CHN-001 and EVT-CHN-002.
  - Producer components are conservative for registry-level schemas; emitter-specific ownership should be narrowed during
    per-spec conversion.
elements:
- element_type: chain_event_schema
  id: EVT-CHN-101
  event: verification_state_transition
  domain: CHN
  severity: high
  components:
    producers:
    - dashboard
    - proxy
    - governance-cli
    consumers:
    - dashboard
    - quality-service
  fields:
    event_model_version:
      type: string
    event_type:
      type: string
      const: verification_state_transition
    event_id:
      type: string
    timestamp_utc:
      type: string
      format: date-time
    prev_record_hash:
      type:
      - string
      - 'null'
    record_hash:
      type: string
      pattern: ^sha256:[0-9a-f]{64}$
    signature:
      type:
      - string
      - 'null'
    signing_key_id:
      type:
      - string
      - 'null'
    governed_family:
      type: string
    from_state:
      type: string
    to_state:
      type: string
  required:
  - event_model_version
  - event_type
  - event_id
  - timestamp_utc
  - record_hash
  - governed_family
  - from_state
  - to_state
  additionalProperties: true
  chain_constraints:
  - hash_linked: true
  - signed: true
  - canonical_hash: true
  check_type: event_triggered
  verification_mode: runtime_monitor
  observe:
    source: chain_record
    selector:
      event_type: verification_state_transition
  verify: Record validates against the common non-action event envelope, event-specific fields where a validator exists, hash
    linkage, canonical record hash, and signature when a signing key is configured.
  status: active
  implementation_status: implemented
  verification_status: unverified
  references:
    legacy_spec:
      file: INVARIANTS.md
      section: 'Appendix: Chain event registry'
    code:
    - file: archive/gov/governance-layer/scripts/event_model.py
      line: 47
    - file: archive/gov/governance-layer/scripts/event_model.py
      line: 529
    - file: archive/gov/governance-layer/scripts/event_model.py
      line: 621
    - file: archive/gov/governance-layer/scripts/event_model.py
      line: 208
  validator: event_model._validate_verification_state_transition
