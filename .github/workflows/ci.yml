name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -m "not shell" -q

  dashboard-module-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # QS-038 / Advisory #5: static import-graph resolution for the
      # dashboard ES modules. Fails if any relative import is unresolved
      # (the QS-025 black-screen class of bug). No browser, no UI test.
      - name: Dashboard JS module-link smoke test
        run: node scripts/check-module-links.mjs
