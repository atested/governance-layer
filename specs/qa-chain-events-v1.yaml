spec_id: qa-chain-events-v1
title: QA Chain Event Registry
status: active
scope: governance-layer
last_verified: '2026-05-23'
owner: greg
imports: []
overview:
  normative_scope: >
    Registry of quality service QA chain event schemas. The quality service
    implementation does not exist yet; these elements establish the schema
    contract future writers and verifiers must satisfy.
  source_note: >
    Derived from quality-service-spec-v1.3-final.md Section 12 as referenced
    by QS-018. The named file was not present in claude-project-files during
    this dispatch, so the provided dispatch text and v1.2.1/v1.3 planning
    context were used as the source.
elements:
- element_type: chain_event_schema
  id: EVT-QA-001
  event: qa_environmental_snapshot
  domain: QA
  severity: critical
  components:
    producers: [quality-service]
    consumers: [proxy, dashboard]
  fields:
    event_type: {type: string, const: qa_environmental_snapshot}
    sequence: {type: integer, minimum: 1}
    timestamp_utc: {type: string, format: date-time}
    policy_rules_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
    capability_registry_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
    checks:
      type: object
      additionalProperties:
        type: object
    active_conditions:
      type: array
      items: {type: string}
    overall:
      type: string
      enum: [healthy, attention, intervention, halted]
    prev_record_hash: {type: [string, 'null']}
    record_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
    signature: {type: string}
    signing_key_id: {type: string}
  required:
  - event_type
  - sequence
  - timestamp_utc
  - policy_rules_hash
  - capability_registry_hash
  - checks
  - active_conditions
  - overall
  - record_hash
  - signature
  - signing_key_id
  additionalProperties: true
  chain_constraints:
  - hash_linked: true
  - signed: true
  - qa_signing_key: true
  - canonical_hash: true
  check_type: event_triggered
  verification_mode: generated_test
  observe:
    source: chain_record
    selector:
      event_type: qa_environmental_snapshot
  verify: QA snapshot validates against this schema and advances the monotonic sequence.
  status: active
  implementation_status: not_implemented
  verification_status: unverified
  references:
    legacy_spec:
      file: quality-service-spec-v1.3-final.md
      section: 'Section 12. qa_environmental_snapshot'
    code: []
- element_type: chain_event_schema
  id: EVT-QA-002
  event: qa_condition_detected
  domain: QA
  severity: critical
  components:
    producers: [quality-service]
    consumers: [proxy, dashboard]
  fields:
    event_type: {type: string, const: qa_condition_detected}
    sequence: {type: integer, minimum: 1}
    timestamp_utc: {type: string, format: date-time}
    condition_id: {type: string}
    condition_type: {type: string}
    severity: {type: string, enum: [critical, high, medium, low]}
    detail: {type: string}
    governance_record_ref: {type: [string, 'null'], pattern: '^sha256:[0-9a-f]{64}$'}
    prev_record_hash: {type: [string, 'null']}
    record_hash: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
    signature: {type: string}
    signing_key_id: {type: string}
  required:
  - event_type
  - sequence
  - timestamp_utc
  - condition_id
  - condition_type
  - severity
  - detail
  - governance_record_ref
  - record_hash
  - signature
  - signing_key_id
  additionalProperties: true
  chain_constraints:
  - hash_linked: true
  - signed: true
  - qa_signing_key: true
  - canonical_hash: true
  check_type: event_triggered
  verification_mode: generated_test
  observe:
    source: chain_record
    selector:
      event_type: qa_condition_detected
  verify: Condition record validates against this schema and references a registry condition.
  status: active
  implementation_status: not_implemented
  verification_status: unverified
  references:
    legacy_spec:
      file: quality-service-spec-v1.3-final.md
      section: 'Section 12. qa_condition_detected'
    code: []
