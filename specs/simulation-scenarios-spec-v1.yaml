  awkward_fit:
    - >
      REQ-SIM-003 through REQ-SIM-007 combine persona copy, UI content,
      fixture values, and product marketing claims. V3 can represent them as
      requirements, but the pass/fail criteria depend on generated-test browser
      fixtures rather than runtime monitoring.
    - >
      The source document uses approximate counts ("~500 events") while code
      uses exact fixture counts. The conversion records those mismatches in
      implemented_scope and missing_scope.
  format_gaps:
    - >
      No new v3 construct was required. A future fixture contract section could
      make simulation data more compact than modeling every scenario as a
      requirement.
  three_status_assessment: >
    The three-status model was useful. It allowed implemented qualitative
    simulation behavior to remain active while marking stale persona/count
    details as partial missing scope instead of pretending the legacy text and
    code are identical.
  references_assessment: >
    Code references were consistently populatable for scenario selection,
    fixture data, window behavior, recommendation logic, and pricing terms.
    Some legacy claims are narrative and do not map to single code lines; those
    are anchored to the nearest fixture or window module.
  ambiguities:
    - >
      V3 does not say whether converted .yaml specs should use frontmatter
      delimiters. The pilot chain-integrity spec used top-level envelope fields,
      so this conversion follows that precedent.
    - >
      V3's ui_state selectors assume test_id coverage. The current public
      simulations do not consistently expose test IDs, so generated tests may
      need DOM selectors or fixture-level checks until test IDs are added.
