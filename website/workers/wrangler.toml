name = "atested-license-worker"
main = "license-worker.js"
compatibility_date = "2024-01-01"

# KV Namespace binding — create with:
#   wrangler kv:namespace create LICENSE_STORE
# Then replace the id below with the output.
[[kv_namespaces]]
binding = "LICENSE_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (set via wrangler secret put):
#   STRIPE_WEBHOOK_SECRET
#   LICENSE_ISSUER_PRIVATE_KEY
#   STRIPE_SECRET_KEY

# Custom domain routing — after deploying, add a custom domain
# in the Cloudflare dashboard: license.atested.com
